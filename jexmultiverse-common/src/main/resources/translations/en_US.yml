      - "<gray>explosions, and fire.</gray>"
  home:
    name: "<gradient:#ff7f50:#ff4500>Teleport home</gradient>"
    lore:
      - ""
      - "<gray>Click to teleport to the</gray>"
      - "<gray>center of this plot.</gray>"
  unclaim:
    name: "<gradient:#dc143c:#b22222>Unclaim plot</gradient>"
    lore:
      - ""
      - "<gray>Releases this plot.</gray>"
      - "<gray>All members and flags are removed.</gray>"

