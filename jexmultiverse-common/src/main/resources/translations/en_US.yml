    internal: "<gradient:#dc143c:#b22222>Internal error:</gradient> <white>{message}</white>"
    invalid-long: "<gradient:#dc143c:#b22222>Invalid integer:</gradient> <white>{value}</white>"
    invalid-double: "<gradient:#dc143c:#b22222>Invalid number:</gradient> <white>{value}</white>"
