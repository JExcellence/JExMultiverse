prefix:
  - "<gradient:#ff7f50:#ff4500>Multiverse</gradient> <dark_gray>|</dark_gray> "

multiverse:
  invalid_environment: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Unbekannte Umgebung <gradient:#ff7f50:#ff4500>{environment}</gradient>. Erlaubt: NORMAL, NETHER, THE_END.</white>"
  invalid_type: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Unbekannter Welttyp <gradient:#ff7f50:#ff4500>{type}</gradient>. Erlaubt: DEFAULT, VOID, PLOT.</white>"
  type_not_available: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welttyp <gradient:#ff7f50:#ff4500>{type}</gradient> ist in dieser Edition nicht verfügbar.</white>"
  world_limit_reached: "<gradient:#dc143c:#b22222>Limit erreicht:</gradient> <white>Maximale Welt-Anzahl erreicht (<gradient:#ff7f50:#ff4500>{max}</gradient>).</white>"
  world_does_not_exist: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> existiert nicht.</white>"
  world_already_exists: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> existiert bereits.</white>"

  creating_world: "<gradient:#ffa500:#ff8c00>Erstelle:</gradient> <white>Erstelle Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient>...</white>"
  create_success: "<gradient:#32cd32:#228b22>Erstellt:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> erstellt. <gray>(Typ: {type}, Env: {environment})</gray></white>"
  create_failed: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> konnte nicht erstellt werden.</white>"

  deleting_world: "<gradient:#ffa500:#ff8c00>Lösche:</gradient> <white>Lösche Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient>...</white>"
  delete_success: "<gradient:#32cd32:#228b22>Gelöscht:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> wurde gelöscht.</white>"
  delete_failed: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> konnte nicht gelöscht werden.</white>"

  teleporting: "<gradient:#ffa500:#ff8c00>Teleportiere:</gradient> <white>Teleportiere zu <gradient:#ff7f50:#ff4500>{world_name}</gradient>...</white>"
  teleported: "<gradient:#32cd32:#228b22>Teleportiert:</gradient> <white>Du bist jetzt in <gradient:#ff7f50:#ff4500>{world_name}</gradient>.</white>"
  world_not_loaded: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> ist nicht geladen.</white>"

  already_loaded: "<gradient:#ffa500:#ff8c00>Info:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> ist bereits geladen.</white>"
  loading_world: "<gradient:#ffa500:#ff8c00>Lade:</gradient> <white>Lade Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient>...</white>"
  load_success: "<gradient:#32cd32:#228b22>Geladen:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> geladen.</white>"
  load_failed: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Welt <gradient:#ff7f50:#ff4500>{world_name}</gradient> konnte nicht geladen werden.</white>"

  list_empty: "<gray>Keine verwalteten Welten gefunden.</gray>"
  list_header: "<gradient:#ff7f50:#ff4500>Verwaltete Welten</gradient> <dark_gray>({count})</dark_gray>"
  list_entry: " <gray>-</gray> <gradient:#ffa500:#ff6347>{world_name}</gradient> <dark_gray>[{type} / {environment}]</dark_gray> <gray>{status}</gray> <dark_gray>global:</dark_gray> <gray>{global_spawn}</gray>"
  list_footer: "<dark_gray>{count}/{max} Welten</dark_gray>"

  help_header: "<gradient:#ff7f50:#ff4500>Multiverse Befehle</gradient>"
  help_create: "<gradient:#ffa500:#ff6347>/{alias} create <name> [env] [typ]</gradient> <gray>- Neue Welt erstellen</gray>"
  help_delete: "<gradient:#ffa500:#ff6347>/{alias} delete <welt></gradient> <gray>- Welt löschen</gray>"
  help_edit: "<gradient:#ffa500:#ff6347>/{alias} edit <welt></gradient> <gray>- Welt-Einstellungen bearbeiten</gray>"
  help_teleport: "<gradient:#ffa500:#ff6347>/{alias} teleport <welt></gradient> <gray>- Zu einer Welt teleportieren</gray>"
  help_load: "<gradient:#ffa500:#ff6347>/{alias} load <welt></gradient> <gray>- Welt aus der Datenbank laden</gray>"
  help_list: "<gradient:#ffa500:#ff6347>/{alias} list</gradient> <gray>- Alle Welten auflisten</gray>"
  help_footer: "<dark_gray>───────────────────────────────</dark_gray>"

multiverse_editor_ui:
  title: "<gradient:#ff7f50:#ff4500>Welt bearbeiten</gradient> <dark_gray>({world_name})</dark_gray>"
  spawn:
    name: "<gradient:#ff7f50:#ff4500>Spawnpunkt setzen</gradient>"
    lore:
      - ""
      - "<gray>Aktuell:</gray> <gradient:#ffa500:#ff6347>{value}</gradient>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Klick</gradient> <gray>um Spawn auf deine Position zu setzen</gray>"
    updated: "<gradient:#32cd32:#228b22>Spawn aktualisiert:</gradient> <white>Spawn für <gradient:#ff7f50:#ff4500>{world_name}</gradient> auf deine Position gesetzt.</white>"
    wrong_world: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Du musst in <gradient:#ff7f50:#ff4500>{world_name}</gradient> sein, um deren Spawn zu setzen.</white>"
  global_spawn:
    name: "<gradient:#ff7f50:#ff4500>Globaler Spawn</gradient> <dark_gray>({value})</dark_gray>"
    lore:
      - ""
      - "<gray>Status:</gray> <gradient:#ffa500:#ff6347>{value}</gradient>"
      - ""
      - "<gray>Wenn aktiviert, spawnen alle</gray>"
      - "<gray>Spieler in dieser Welt.</gray>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Klick</gradient> <gray>zum Umschalten</gray>"
    toggled: "<gradient:#32cd32:#228b22>Globaler Spawn:</gradient> <white><gradient:#ff7f50:#ff4500>{world_name}</gradient> ist jetzt <gradient:#ffa500:#ff6347>{value}</gradient>.</white>"
    replaced: "<gradient:#ffa500:#ff8c00>Globaler Spawn:</gradient> <white>Vorheriger globaler Spawn (<gradient:#ff7f50:#ff4500>{previous}</gradient>) durch <gradient:#ff7f50:#ff4500>{world_name}</gradient> ersetzt.</white>"
  pvp:
    name: "<gradient:#ff7f50:#ff4500>PvP-Schalter</gradient> <dark_gray>({value})</dark_gray>"
    lore:
      - ""
      - "<gray>Status:</gray> <gradient:#ffa500:#ff6347>{value}</gradient>"
      - ""
      - "<gray>Steuert ob Spieler sich</gray>"
      - "<gray>in dieser Welt bekämpfen können.</gray>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Klick</gradient> <gray>zum Umschalten</gray>"
    toggled: "<gradient:#32cd32:#228b22>PvP:</gradient> <white>PvP in <gradient:#ff7f50:#ff4500>{world_name}</gradient> ist jetzt <gradient:#ffa500:#ff6347>{value}</gradient>.</white>"
  time:
    name: "<gradient:#ff7f50:#ff4500>Tageszeit</gradient> <dark_gray>({value})</dark_gray>"
    lore:
      - ""
      - "<gray>Aktuell:</gray> <gradient:#ffa500:#ff6347>{value}</gradient>"
      - ""
      - "<gray>Wechselt Morgen → Mittag → Abend → Nacht.</gray>"
      - "<gray>Nur Live-Welt — nicht gespeichert.</gray>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Klick</gradient> <gray>um weiterzuschalten</gray>"
    updated: "<gradient:#32cd32:#228b22>Zeit:</gradient> <white>Tageszeit in <gradient:#ff7f50:#ff4500>{world_name}</gradient> auf <gradient:#ffa500:#ff6347>{value}</gradient> gesetzt.</white>"
  weather:
    name: "<gradient:#ff7f50:#ff4500>Wetter</gradient> <dark_gray>({value})</dark_gray>"
    lore:
      - ""
      - "<gray>Aktuell:</gray> <gradient:#ffa500:#ff6347>{value}</gradient>"
      - ""
      - "<gray>Wechselt klar → Regen → Sturm.</gray>"
      - "<gray>Nur Live-Welt — nicht gespeichert.</gray>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Klick</gradient> <gray>um weiterzuschalten</gray>"
    updated: "<gradient:#32cd32:#228b22>Wetter:</gradient> <white>Wetter in <gradient:#ff7f50:#ff4500>{world_name}</gradient> auf <gradient:#ffa500:#ff6347>{value}</gradient> gesetzt.</white>"
  difficulty:
    name: "<gradient:#ff7f50:#ff4500>Schwierigkeit</gradient> <dark_gray>({value})</dark_gray>"
    lore:
      - ""
      - "<gray>Aktuell:</gray> <gradient:#ffa500:#ff6347>{value}</gradient>"
      - ""
      - "<gray>Wechselt friedlich → einfach → normal → schwer.</gray>"
      - "<gray>Nur Live-Welt — nicht gespeichert.</gray>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Klick</gradient> <gray>um weiterzuschalten</gray>"
    updated: "<gradient:#32cd32:#228b22>Schwierigkeit:</gradient> <white>Schwierigkeit in <gradient:#ff7f50:#ff4500>{world_name}</gradient> auf <gradient:#ffa500:#ff6347>{value}</gradient> gesetzt.</white>"
  save:
    name: "<gradient:#32cd32:#228b22>Änderungen speichern</gradient>"
    lore:
      - ""
      - "<gray>Speichert alle Änderungen an <gradient:#ff7f50:#ff4500>{world_name}</gradient> in die Datenbank.</gray>"
      - ""
      - "<gradient:#32cd32:#228b22>Klick</gradient> <gray>zum Speichern</gray>"
    success: "<gradient:#32cd32:#228b22>Gespeichert:</gradient> <white>Änderungen an <gradient:#ff7f50:#ff4500>{world_name}</gradient> gespeichert.</white>"
    failed: "<gradient:#dc143c:#b22222>Speichern fehlgeschlagen:</gradient> <white>Änderungen an <gradient:#ff7f50:#ff4500>{world_name}</gradient>: <gray>{error}</gray></white>"

multiverse_list_ui:
  title: "<gradient:#ff7f50:#ff4500>Verwaltete Welten</gradient>"
  entry:
    name: "<gradient:#ffa500:#ff6347>{world_name}</gradient>"
    lore:
      - ""
      - "<gray>Typ:</gray> <white>{type}</white>"
      - "<gray>Umgebung:</gray> <white>{environment}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Globaler Spawn:</gray> <white>{global_spawn}</white>"
      - "<gray>PvP:</gray> <white>{pvp}</white>"
      - "<gray>Spawn:</gray> <white>{spawn}</white>"
      - ""
      - "<gradient:#ff7f50:#ff4500>Linksklick</gradient> <gray>- hierher teleportieren</gray>"
      - "<gradient:#ff7f50:#ff4500>Rechtsklick</gradient> <gray>- Einstellungen bearbeiten</gray>"
  page:
    name: "<gradient:#ff7f50:#ff4500>Seite {page}/{total_pages}</gradient>"
    lore:
      - "<gray>Zeige Seite {current_page} von {max_page}</gray>"
  previous: "<gradient:#ff7f50:#ff4500>← Zurück</gradient>"
  next: "<gradient:#ff7f50:#ff4500>Weiter →</gradient>"
  loading: "<gray>Lädt...</gray>"

spawn:
  teleporting_to_spawn: "<gradient:#ffa500:#ff8c00>Teleportiere:</gradient> <white>Teleportiere zum Spawn...</white>"
  spawn_not_found: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Kein Spawnpunkt konfiguriert.</white>"
  teleported: "<gradient:#32cd32:#228b22>Teleportiert:</gradient> <white>Du wurdest zum Spawn teleportiert.</white>"
  teleport_failed: "<gradient:#dc143c:#b22222>Fehler:</gradient> <white>Teleport zum Spawn fehlgeschlagen. Bitte versuche es erneut.</white>"

# ── JExCommand framework keys (parse errors, usage, permission denials) ─────
jexcommand:
  usage: "<gradient:#ff7f50:#ff4500>Verwendung:</gradient> <white>{usage}</white>"
  error:
    missing-argument: "<gradient:#dc143c:#b22222>Fehlendes Argument:</gradient> <gold>{name}</gold> <dark_gray>(<gray>{type}</gray>)</dark_gray>"
    too-many-arguments: "<gradient:#dc143c:#b22222>Zu viele Argumente.</gradient>"
    unknown-subcommand: "<gradient:#dc143c:#b22222>Unbekannter Unterbefehl:</gradient> <gold>{name}</gold>"
    no-permission: "<gradient:#dc143c:#b22222>Keine Berechtigung.</gradient> <dark_gray>(<gray>{permission}</gray>)</dark_gray>"
    not-a-player: "<gradient:#dc143c:#b22222>Nur Spieler.</gradient>"
    not-a-console: "<gradient:#dc143c:#b22222>Nur Konsole.</gradient>"
    unknown-type: "<gradient:#dc143c:#b22222>Unbekannter Argumenttyp:</gradient> <gold>{type}</gold>"
    internal: "<gradient:#dc143c:#b22222>Interner Fehler:</gradient> <white>{message}</white>"
    invalid-long: "<gradient:#dc143c:#b22222>Keine gültige Ganzzahl:</gradient> <white>{value}</white>"
    invalid-double: "<gradient:#dc143c:#b22222>Keine gültige Zahl:</gradient> <white>{value}</white>"
    not-positive-long: "<gradient:#dc143c:#b22222>Muss positiv sein:</gradient> <white>{value}</white>"
    not-positive-double: "<gradient:#dc143c:#b22222>Muss positiv sein:</gradient> <white>{value}</white>"
    player-not-online: "<gradient:#dc143c:#b22222>Nicht online:</gradient> <white>{value}</white>"
    player-unknown: "<gradient:#dc143c:#b22222>Unbekannter Spieler:</gradient> <white>{value}</white>"
    invalid-enum: "<gradient:#dc143c:#b22222>Ungültiger Wert:</gradient> <white>{value}</white> <gray>(erlaubt: {options})</gray>"
    invalid-uuid: "<gradient:#dc143c:#b22222>Ungültige UUID:</gradient> <white>{value}</white>"
    expected-single-word: "<gradient:#dc143c:#b22222>Einzelnes Wort ohne Leerzeichen erwartet.</gradient>"
