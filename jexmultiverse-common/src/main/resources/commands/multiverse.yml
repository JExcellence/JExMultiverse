# JExCommand 2.0 tree — /multiverse (admin)
# World management tooling for JExMultiverse.

name: multiverse
description: "Manage multiverse worlds"
aliases:
  - mv
permission: "jexmultiverse.command"
senders: [player]

subcommands:
  - name: create
    description: "Create a new world"
    permission: "jexmultiverse.command.create"
    senders: [player]
    argumentSchema:
      - { name: name,        type: string,                                                        required: true,  description: "World name" }
      - { name: environment, type: environment,                                                   required: false, description: "World environment (NORMAL, NETHER, THE_END)" }
      - { name: type,        type: "enum(de.jexcellence.multiverse.api.MVWorldType)",             required: false, description: "World type" }
      - { name: plot_size,   type: positive_long,                                                  required: false, description: "Per-world plot size override (PLOT only)" }
      - { name: road_width,  type: positive_long,                                                  required: false, description: "Per-world road width override (PLOT only)" }
      - { name: schematic,   type: string,                                                         required: false, description: "Schematic file name without .nbt extension (PLOT only)" }

  - name: delete
    description: "Delete a world"
    permission: "jexmultiverse.command.delete"
    senders: [player]
    argumentSchema:
      - { name: world, type: world, required: true, description: "Target world" }

  - name: edit
    description: "Edit world settings"
    permission: "jexmultiverse.command.edit"
    senders: [player]
    argumentSchema:
      - { name: world, type: world, required: true, description: "Target world" }

  - name: teleport
    description: "Teleport to a world"
    permission: "jexmultiverse.command.teleport"
    senders: [player]
    argumentSchema:
      - { name: world, type: world, required: true, description: "Target world" }

  - name: load
    description: "Load a world from database"
    permission: "jexmultiverse.command.load"
    senders: [player]
    argumentSchema:
      - { name: world, type: world, required: true, description: "Target world" }

  - name: list
    description: "List all managed worlds"
    permission: "jexmultiverse.command.list"
    senders: [player, console]

  - name: applyschematic
    description: "Re-paste a schematic into every plot in a PLOT world's loaded chunks"
    permission: "jexmultiverse.command.applyschematic"
    senders: [player, console]
    argumentSchema:
      - { name: world,     type: world,  required: true,  description: "Target plot world" }
      - { name: schematic, type: string, required: false, description: "Schematic name (defaults to world's stored schematic)" }

  - name: paste
    description: "Paste a schematic file, or your clipboard when no name is given"
    permission: "jexmultiverse.command.paste"
    senders: [player]
    argumentSchema:
      - { name: schematic, type: string, required: false, description: "Schematic file name (without extension); omit to paste your /mv copy clipboard" }
      - { name: setspawn,  type: string, required: false, description: "Pass 'setspawn' to also set this world's spawn to the paste point" }

  # ── WorldEdit-free region toolkit ───────────────────────────────────────────
  - name: wand
    description: "Receive the selection wand (golden axe): left-click = pos1, right-click = pos2"
    permission: "jexmultiverse.command.schematic"
    senders: [player]

  - name: pos1
    description: "Set selection corner 1 to the block you stand on"
    permission: "jexmultiverse.command.schematic"
    senders: [player]

  - name: pos2
    description: "Set selection corner 2 to the block you stand on"
    permission: "jexmultiverse.command.schematic"
    senders: [player]

  - name: copy
    description: "Copy the current selection (blocks + entities) to your clipboard"
    permission: "jexmultiverse.command.schematic"
    senders: [player]

  - name: cut
    description: "Copy the selection to your clipboard, then clear it"
    permission: "jexmultiverse.command.schematic"
    senders: [player]

  - name: save
    description: "Save the current selection to a .nbt schematic (entities included)"
    permission: "jexmultiverse.command.schematic"
    senders: [player]
    argumentSchema:
      - { name: name, type: string, required: true, description: "Output schematic name (without extension)" }

  - name: rotate
    description: "Rotate your clipboard clockwise (90, 180 or 270 degrees)"
    permission: "jexmultiverse.command.schematic"
    senders: [player]
    argumentSchema:
      - { name: degrees, type: string, required: true, description: "90, 180 or 270" }

  - name: flip
    description: "Mirror your clipboard across an axis (x or z)"
    permission: "jexmultiverse.command.schematic"
    senders: [player]
    argumentSchema:
      - { name: axis, type: string, required: false, description: "x (east/west) or z (north/south); defaults to x" }

  - name: undo
    description: "Restore the region overwritten by your last paste"
    permission: "jexmultiverse.command.schematic"
    senders: [player]

  - name: help
    description: "Show help"
    senders: [player]
